<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Эксперимент с Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="custom.css">
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center mb-5">Карточки товаров</h2>
        <div class="row justify-content-center g-4">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-lg">
                    <img src="https://placeholder.apptor.studio/400/300/laptop.png" class="card-img-top" alt="Ноутбук">
                    <div class="card-body">
                        <span class="badge bg-warning text-dark mb-2">★★★★☆ 4.5</span>
                        <h5 class="card-title">Игровой ноутбук</h5>
                        <p class="card-text">Мощный ноутбук для работы и игр</p>
                        <p class="fs-4 fw-bold">89 990 ₽</p>
                        <a href="#" class="btn btn-primary">Подробнее</a>
                        <button class="btn btn-success w-100 mt-2">Купить</button>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-lg">
                    <img src="https://placeholder.apptor.studio/400/300/phone.png" class="card-img-top" alt="Смартфон">
                    <div class="card-body">
                        <span class="badge bg-danger mb-2">★★★★★ 5.0</span>
                        <h5 class="card-title">Смартфон Pro Max</h5>
                        <p class="card-text">Флагманский смартфон с отличной камерой</p>
                        <p class="fs-4 fw-bold">79 990 ₽</p>
                        <a href="#" class="btn btn-primary">Подробнее</a>
                        <button class="btn btn-success w-100 mt-2">Купить</button>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-lg">
                    <img src="https://placeholder.apptor.studio/400/300/headphones.png" class="card-img-top" alt="Наушники">
                    <div class="card-body">
                        <span class="badge bg-info mb-2">★★★★☆ 4.2</span>
                        <h5 class="card-title">Беспроводные наушники</h5>
                        <p class="card-text">Качественный звук с шумоподавлением</p>
                        <p class="fs-4 fw-bold">12 990 ₽</p>
                        <a href="#" class="btn btn-primary">Подробнее</a>
                        <button class="btn btn-success w-100 mt-2">Купить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
