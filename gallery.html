<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея портфолио</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="custom.css">
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center mb-4">Моё Портфолио</h2>
        <div class="text-center mb-4">
            <div class="btn-group" role="group">
                <button class="btn btn-outline-primary" onclick="filterGallery('all')">Все</button>
                <button class="btn btn-outline-primary" onclick="filterGallery('web')">Веб-дизайн</button>
                <button class="btn btn-outline-primary" onclick="filterGallery('photo')">Фотография</button>
                <button class="btn btn-outline-primary" onclick="filterGallery('graphic')">Графика</button>
            </div>
        </div>

        <div class="row g-3" id="gallery">
            <div class="col-6 col-md-4 gallery-item" data-category="web">
                <div class="card h-100">
                    <img src="https://placeholder.apptor.studio/400/300/website.png" class="card-img-top" alt="Веб-проект">
                    <div class="card-body p-2">
                        <h6 class="card-title mb-0">Корпоративный сайт</h6>
                        <small class="text-muted">Веб-дизайн</small>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-4 gallery-item" data-category="web">
                <div class="card h-100">
                    <img src="https://placeholder.apptor.studio/400/300/shop.png" class="card-img-top" alt="Интернет-магазин">
                    <div class="card-body p-2">
                        <h6 class="card-title mb-0">Интернет-магазин</h6>
                        <small class="text-muted">Веб-дизайн</small>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-4 gallery-item" data-category="photo">
                <div class="card h-100">
                    <img src="https://placeholder.apptor.studio/400/300/nature.png" class="card-img-top" alt="Природа">
                    <div class="card-body p-2">
                        <h6 class="card-title mb-0">Фото природы</h6>
                        <small class="text-muted">Фотография</small>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-4 gallery-item" data-category="photo">
                <div class="card h-100">
                    <img src="https://placeholder.apptor.studio/400/300/city.png" class="card-img-top" alt="Город">
                    <div class="card-body p-2">
                        <h6 class="card-title mb-0">Городской пейзаж</h6>
                        <small class="text-muted">Фотография</small>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-4 gallery-item" data-category="graphic">
                <div class="card h-100">
                    <img src="https://placeholder.apptor.studio/400/300/art.png" class="card-img-top" alt="Арт">
                    <div class="card-body p-2">
                        <h6 class="card-title mb-0">Цифровой арт</h6>
                        <small class="text-muted">Графика</small>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-4 gallery-item" data-category="graphic">
                <div class="card h-100">
                    <img src="https://placeholder.apptor.studio/400/300/logo.png" class="card-img-top" alt="Логотип">
                    <div class="card-body p-2">
                        <h6 class="card-title mb-0">Дизайн логотипа</h6>
                        <small class="text-muted">Графика</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
        function filterGallery(category) {
            const items = document.querySelectorAll(".gallery-item");
            const buttons = document.querySelectorAll(".btn-group .btn");
            buttons.forEach((btn) => {
                btn.classList.remove("active");
            });
            event.target.classList.add("active");
            items.forEach((item) => {
                const itemCategory = item.dataset.category;
                if (category === "all" || category === itemCategory) {
                    item.style.display = "block";
                } else {
                    item.style.display = "none";
                }
            });
        }

        window.onload = function () {
            document.querySelector(".btn-group .btn").classList.add("active");
        };
    </script>
</body>
</html>
